            </div>
            <div class="box3">
                <div class="box6">
                    <div class="box9-1"><a>图书展示区</a><br><img src="img/三国志.png"><a>三国志</a></div>

<div class="modal" id="tanchuang">
  <div class="modal_box">
    <span class="close" onclick="guanbitanchuang()">×</span>
    <div id="denglukai">
      <h3>登录</h3>
      <input type="text" id="yonghuming" placeholder="用户名"><br>
      <input type="password" id="mima" placeholder="密码"><br>
      <button onclick="denglu()">登录</button>
      <p>没有账号？<span class="link" onclick="qiehuanzhuce()">去注册</span></p>
    </div>
    <div id="zhucekai" style="display:none">
      <h3>注册</h3>
      <input type="text" id="zhuceyonghu" placeholder="用户名"><br>
      <input type="password" id="zhucemima" placeholder="密码"><br>
      <button onclick="zhuce()">注册</button>
      <p>已有账号？<span class="link" onclick="qiehuandenglu()">去登录</span></p>
    </div>
  </div>
</div>

<script>
const dengluanniu = document.getElementById('dengluanniu');

dengluanniu.onclick = function(){
  document.getElementById('tanchuang').style.display = 'block';
}
function guanbitanchuang(){
  document.getElementById('tanchuang').style.display = 'none';
}
function qiehuanzhuce(){
  document.getElementById('denglukai').style.display = 'none';
  document.getElementById('zhucekai').style.display = 'block';
}
function qiehuandenglu(){
  document.getElementById('zhucekai').style.display = 'none';
  document.getElementById('denglukai').style.display = 'block';
}

function denglu(){
  let yonghuming = document.getElementById('yonghuming').value;
  let mima = document.getElementById('mima').value;
  
  if(yonghuming && mima){
    alert('登录成功！');
    dengluanniu.textContent = yonghuming;
    guanbitanchuang();
  }else{
    alert('请输入账号密码！');
  }
}

function zhuce(){
  let zhuceyonghu = document.getElementById('zhuceyonghu').value;
  let zhucemima = document.getElementById('zhucemima').value;
  
  if(zhuceyonghu && zhucemima){
    localStorage.setItem('user', zhuceyonghu);
    localStorage.setItem('pwd', zhucemima);
    alert('注册成功！');
    qiehuandenglu();
  }else{
    alert('请输入账号密码！');
  }
}
</script>
</body>
